<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iocscan — Threat Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Vue 3 GLOBAL build — exposes window.Vue, required by all component files -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:'#070b12', bg2:'#0d1320', bg3:'#131a28', bg4:'#192030',
            border1:'#1e2d42', border2:'#243550',
            accent:'#38bdf8', accent2:'#0ea5e9',
            dim:'#2e4060', muted:'#4d6480',
            text1:'#94a3b8', text2:'#cbd5e1',
          },
          fontFamily: {
            mono: ['JetBrains Mono','monospace'],
            sans: ['Inter','system-ui','sans-serif'],
            display: ['Syne','Inter','sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --bg:#070b12; --bg2:#0d1320; --bg3:#131a28; --bg4:#192030;
      --border:#1e2d42; --border2:#243550;
      --accent:#38bdf8; --accent2:#0ea5e9;
      --dim:#2e4060; --muted:#4d6480;
      --text:#94a3b8; --text2:#cbd5e1;
      --red:#f87171; --orange:#fb923c; --yellow:#fbbf24; --green:#34d399;
      --mono:'JetBrains Mono',monospace;
      --sans:'Inter',sans-serif;
    }
    * { box-sizing: border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); margin:0; min-height:100vh; }
    body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 3px); pointer-events:none; z-index:50; }

    /* ── Shell ── */
    .shell { max-width:960px; margin:0 auto; padding:0 24px 60px; }
    .shell.wide { max-width:100%; padding:0 32px 60px; }

    /* ── Risk pills ── */
    .risk-pill { font-family:var(--sans); font-size:0.6rem; font-weight:700; letter-spacing:0.12em; padding:3px 10px; border:1px solid; text-transform:uppercase; display:inline-block; }
    .risk-CRITICAL { color:#f87171; border-color:rgba(248,113,113,0.5); background:rgba(248,113,113,0.08); }
    .risk-HIGH     { color:#fb923c; border-color:rgba(251,146,60,0.5);  background:rgba(251,146,60,0.08); }
    .risk-MEDIUM   { color:#fbbf24; border-color:rgba(251,191,36,0.5);  background:rgba(251,191,36,0.08); }
    .risk-LOW      { color:#94a3b8; border-color:rgba(148,163,184,0.4); background:rgba(148,163,184,0.04); }
    .risk-CLEAN    { color:#34d399; border-color:rgba(52,211,153,0.4);  background:rgba(52,211,153,0.08); }
    .t-risk { font-size:0.58rem; font-weight:700; letter-spacing:0.1em; padding:2px 8px; border:1px solid; text-transform:uppercase; display:inline-block; }

    /* ── Tabs ── */
    .ioc-tab { padding:8px 20px; font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); transition:all 0.2s; background:none; border-top:none; border-left:none; border-right:none; }
    .ioc-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .ioc-tab:hover:not(.active) { color:var(--text); }

    /* ── IP chip tabs ── */
    .ip-tab { display:flex; align-items:center; gap:7px; padding:5px 16px; background:var(--bg3); border:1px solid var(--border); font-family:var(--mono); font-size:0.68rem; cursor:pointer; color:var(--muted); transition:all 0.2s; }
    .ip-tab:hover:not(.active) { border-color:var(--border2); color:var(--text); }
    .ip-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(56,189,248,0.08); }
    .ip-tab-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Input ── */
    .scan-input { width:100%; background:var(--bg3); border:1px solid var(--border); border-left:3px solid var(--accent); color:var(--text2); font-family:var(--mono); font-size:0.8rem; padding:14px 16px; resize:vertical; min-height:60px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .scan-input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(56,189,248,0.1); }
    .scan-input::placeholder { color:var(--dim); }
    .key-input { width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:0.72rem; padding:10px 14px; outline:none; font-style:italic; transition:border-color 0.2s; }
    .key-input:focus { border-color:var(--accent); }
    .key-input::placeholder { color:var(--dim); }

    /* ── Buttons ── */
    .scan-btn { background:var(--accent2); color:var(--bg); font-family:var(--sans); font-size:0.72rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; padding:0 28px; min-height:44px; cursor:pointer; border:none; transition:background 0.2s; flex-shrink:0; }
    .scan-btn:hover:not(:disabled) { background:var(--accent); }
    .scan-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .action-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:var(--sans); font-size:0.62rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:5px 14px; cursor:pointer; transition:all 0.15s; }
    .action-btn:hover { border-color:var(--accent); color:var(--accent); }
    .view-btn { padding:6px 18px; background:var(--bg3); border:1px solid var(--border); color:var(--muted); font-family:var(--sans); font-size:0.68rem; font-weight:600; letter-spacing:0.08em; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
    .view-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(56,189,248,0.08); }
    .export-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:var(--sans); font-size:0.66rem; font-weight:600; letter-spacing:0.06em; padding:6px 14px; cursor:pointer; text-transform:uppercase; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
    .export-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ── Cards ── */
    .result-card { background:var(--bg3); border:1px solid var(--border); padding:18px 20px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(288px,1fr)); gap:14px; margin-bottom:18px; }
    .card { background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 100%); border:1px solid var(--border); border-top:1px solid var(--border2); padding:18px 20px; animation:fadeUp 0.35s ease both; box-shadow:0 4px 24px rgba(0,0,0,0.35); transition:border-color 0.2s,box-shadow 0.2s; }
    .card:hover { border-color:var(--border2); box-shadow:0 6px 32px rgba(0,0,0,0.45); }
    .card:nth-child(2) { animation-delay:0.07s; }
    .card:nth-child(3) { animation-delay:0.14s; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .card-head { font-family:var(--sans); font-size:0.6rem; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--text); padding-bottom:10px; border-bottom:1px solid var(--border2); margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .card-head-left { display:flex; align-items:center; gap:8px; }
    .card-source-link { font-family:var(--sans); font-size:0.58rem; font-weight:600; letter-spacing:0.06em; color:var(--muted); text-decoration:none; padding:2px 7px; border:1px solid var(--dim); text-transform:uppercase; transition:all 0.15s; white-space:nowrap; }
    .card-source-link:hover { color:var(--accent); border-color:var(--accent); }
    .kv { display:flex; justify-content:space-between; align-items:baseline; padding:5px 0; gap:10px; }
    .kv+.kv { border-top:1px solid rgba(30,45,66,0.8); }
    .kv-key { font-family:var(--sans); font-weight:500; color:var(--muted); font-size:0.7rem; flex-shrink:0; letter-spacing:0.01em; }
    .kv-val { font-family:var(--mono); color:var(--text2); font-size:0.72rem; text-align:right; word-break:break-all; }
    .meter { height:3px; background:var(--border); margin-top:6px; overflow:hidden; }
    .meter-bar { height:100%; transition:width 0.8s ease; }
    .vt-pills { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .vt-pill { font-size:0.72rem; padding:4px 12px; border:1px solid var(--border); font-family:var(--sans); font-weight:600; }
    .vt-pill.mal { color:var(--red);    border-color:rgba(248,113,113,0.3); }
    .vt-pill.sus { color:var(--yellow); border-color:rgba(251,191,36,0.3); }
    .vt-pill.ok  { color:var(--green);  border-color:rgba(52,211,153,0.3); }
    .vt-pill.unk { color:var(--muted);  border-color:rgba(78,100,128,0.3); }

    /* ── JSON panel ── */
    .json-panel { background:var(--bg2); border:1px solid var(--border); border-top:1px solid var(--border2); padding:20px; position:relative; box-shadow:0 2px 16px rgba(0,0,0,0.3); }
    .json-panel::before { content:'RAW JSON'; position:absolute; top:-8px; left:14px; background:var(--bg2); padding:0 8px; font-size:0.57rem; letter-spacing:0.28em; color:var(--muted); }
    .copy-btn { float:right; margin-bottom:10px; background:transparent; border:1px solid var(--dim); color:var(--dim); font-family:var(--mono); font-size:0.6rem; padding:3px 10px; cursor:pointer; letter-spacing:0.1em; transition:all 0.15s; }
    .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
    pre { font-family:var(--mono); white-space:pre-wrap; overflow-x:auto; font-size:0.7rem; line-height:1.85; color:var(--muted); }
    .j-k { color:var(--accent); } .j-s { color:#a5d6a7; } .j-n { color:var(--yellow); } .j-b { color:var(--orange); } .j-0 { color:var(--muted); }

    /* ── Table ── */
    .ioc-table { width:100%; border-collapse:collapse; font-size:0.72rem; font-family:var(--mono); }
    .ioc-table thead tr { background:var(--bg3); }
    .ioc-table th { text-align:left; padding:10px 14px; border-bottom:2px solid var(--accent2); color:var(--accent); font-family:var(--sans); font-size:0.6rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; white-space:nowrap; cursor:pointer; user-select:none; background:linear-gradient(180deg,var(--bg4) 0%,var(--bg3) 100%); }
    .ioc-table th:hover { color:#e2e8f0; background:rgba(56,189,248,0.06); }
    .ioc-table th .sort-icon { margin-left:4px; opacity:0.35; font-size:0.5rem; }
    .ioc-table th.sorted .sort-icon { opacity:1; color:var(--accent); }
    .ioc-table td { padding:9px 14px; border-bottom:1px solid rgba(30,45,66,0.7); color:var(--text); vertical-align:middle; white-space:nowrap; }
    .ioc-table tbody tr:nth-child(even) td { background:rgba(13,19,32,0.4); }
    .ioc-table tr:hover td { background:rgba(56,189,248,0.04) !important; }
    .ioc-table tr.clickable { cursor:pointer; }
    .ioc-table tr.clickable:hover td { background:rgba(56,189,248,0.07) !important; }
    .t-na { color:var(--dim); font-style:italic; }
    .t-links { display:flex; gap:5px; align-items:center; }
    .t-link { font-family:var(--sans); font-size:0.56rem; font-weight:700; letter-spacing:0.06em; padding:2px 6px; border:1px solid; text-decoration:none; transition:all 0.15s; white-space:nowrap; }
    .t-link.vt { color:var(--accent); border-color:rgba(56,189,248,0.4); }
    .t-link.ab { color:var(--orange); border-color:rgba(251,146,60,0.4); }
    .t-link.ip { color:var(--green);  border-color:rgba(52,211,153,0.4); }
    .t-hostname { display:inline-flex; align-items:center; padding:2px 8px; border:1px solid var(--border); font-size:0.6rem; color:var(--muted); margin:2px; }
    .t-bool-yes { color:var(--green); }
    .t-bool-no  { color:var(--red); }

    /* ── Copy split button ── */
    .copy-split { position:relative; display:flex; }
    .copy-split .copy-main { border-right:none; padding-right:10px; }
    .copy-split .copy-arrow { padding:6px 8px; border-left:1px solid var(--border2); font-size:0.6rem; }
    .copy-menu { display:none; position:absolute; top:calc(100% + 4px); right:0; background:var(--bg2); border:1px solid var(--border2); border-top:2px solid var(--accent); min-width:160px; z-index:200; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
    .copy-menu.open { display:block; }
    .copy-menu-item { padding:9px 14px; font-family:var(--sans); font-size:0.68rem; font-weight:500; color:var(--text); cursor:pointer; transition:background 0.12s,color 0.12s; border-bottom:1px solid rgba(30,45,66,0.6); }
    .copy-menu-item:last-child { border-bottom:none; }
    .copy-menu-item:hover { background:rgba(56,189,248,0.07); color:var(--accent); }

    /* ── Progress ── */
    .bulk-progress { display:none; flex-direction:column; gap:6px; margin-top:10px; }
    .bulk-progress.on { display:flex; }
    .progress-bar-wrap { height:3px; background:var(--border); overflow:hidden; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width 0.3s ease; width:0%; }

    /* ── Error ── */
    .err-box { color:var(--red); background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.3); border-left:3px solid var(--red); padding:10px 16px; font-size:0.75rem; margin-bottom:14px; }

    /* ── Loader ── */
    .loader { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-left:10px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Bulk preview ── */
    .bulk-preview { display:flex; align-items:center; gap:8px; font-size:0.62rem; color:var(--muted); }

    /* ── Drag highlight ── */
    .drag-over .scan-input { border-color:var(--accent) !important; background:rgba(56,189,248,0.04) !important; }

    /* ── Column drawer ── */
    .col-drawer-wrap { position:relative; }
    .col-drawer { display:none; position:absolute; top:calc(100% + 8px); right:0; width:270px; max-height:80vh; background:var(--bg2); border:1px solid var(--border2); border-top:2px solid var(--accent); z-index:9999; flex-direction:column; box-shadow:0 16px 60px rgba(0,0,0,0.7); }
    .col-drawer.open { display:flex; }
    .col-overlay { display:none; position:fixed; inset:0; z-index:9998; }
    .col-overlay.on { display:block; }

    /* ── History drawer ── */
    .hist-drawer { display:none; position:absolute; top:calc(100% + 8px); right:0; width:320px; max-height:70vh; background:var(--bg2); border:1px solid var(--border2); border-top:2px solid rgba(56,189,248,0.5); z-index:9999; flex-direction:column; box-shadow:0 16px 60px rgba(0,0,0,0.7); }
    .hist-drawer.open { display:flex; }
    .hist-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid rgba(30,45,66,0.5); cursor:pointer; transition:background 0.12s; }
    .hist-item:hover { background:rgba(56,189,248,0.04); }

    /* ── Column toggle rows ── */
    .col-section-head { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; background:var(--bg); border-bottom:1px solid var(--border); cursor:pointer; font-family:var(--sans); font-size:0.68rem; font-weight:700; letter-spacing:0.08em; color:var(--accent); }
    .col-section-head:hover { background:rgba(56,189,248,0.04); }
    .col-row { display:flex; align-items:center; justify-content:space-between; padding:9px 14px 9px 22px; border-bottom:1px solid rgba(30,45,66,0.5); cursor:pointer; transition:background 0.1s; }
    .col-row:hover { background:rgba(56,189,248,0.05); }
    .col-row-top { padding-left:14px; }
    .col-row-label { font-family:var(--sans); font-size:0.7rem; font-weight:500; color:var(--text); }

    /* ── Toggle switch ── */
    .tog { width:32px; height:16px; background:#1e2a2e; border:1.5px solid #2a4048; border-radius:8px; position:relative; flex-shrink:0; transition:background 0.2s,border-color 0.2s; cursor:pointer; padding:0; outline:none; }
    .tog::after { content:''; position:absolute; width:10px; height:10px; background:var(--dim); border-radius:50%; top:2px; left:2px; transition:transform 0.2s,background 0.2s; }
    .tog.on { background:rgba(0,217,245,0.15); border-color:var(--accent); }
    .tog.on::after { transform:translateX(16px); background:var(--accent); }

    /* ── Hash cards ── */
    .hash-result-card { background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 100%); border:1px solid var(--border); border-top:3px solid var(--border2); padding:20px 22px; animation:fadeUp 0.3s ease both; box-shadow:0 4px 24px rgba(0,0,0,0.4); }
    .hash-result-card.critical { border-top-color:var(--red); }
    .hash-result-card.high     { border-top-color:var(--orange); }
    .hash-result-card.medium   { border-top-color:var(--yellow); }
    .hash-result-card.low      { border-top-color:var(--text); }
    .hash-result-card.clean    { border-top-color:var(--green); }
    .hash-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:16px; }
    .hash-card-title { font-family:var(--mono); font-size:0.72rem; color:#e2e8f0; font-weight:600; word-break:break-all; line-height:1.5; margin-bottom:8px; }
    .hash-card-meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .hash-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; margin-bottom:14px; }
    .hash-section-title { font-family:var(--sans); font-size:0.58rem; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .hash-kv { display:flex; justify-content:space-between; align-items:baseline; padding:5px 0; gap:10px; border-bottom:1px solid rgba(30,45,66,0.6); font-size:0.72rem; }
    .hash-kv:last-child { border-bottom:none; }
    .hash-kv-key { font-family:var(--sans); font-size:0.62rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); flex-shrink:0; white-space:nowrap; }
    .hash-kv-val { font-family:var(--mono); font-size:0.7rem; color:var(--text2); text-align:right; word-break:break-word; max-width:65%; }
    .hash-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
    .hash-vt-pills { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
    .codesign-box { background:rgba(248,113,113,0.06); border:1px solid rgba(248,113,113,0.25); border-left:3px solid var(--red); padding:10px 12px; margin-top:10px; }
    .codesign-revoked { font-family:var(--sans); font-size:0.62rem; font-weight:700; letter-spacing:0.06em; color:var(--red); margin-top:5px; }
    .hash-type-badge { font-family:var(--sans); font-size:0.58rem; font-weight:600; letter-spacing:0.08em; padding:2px 8px; border:1px solid rgba(56,189,248,0.35); color:var(--accent); }
    .hash-threat-label { font-family:var(--sans); font-size:0.58rem; padding:2px 8px; border:1px solid rgba(248,113,113,0.3); color:var(--red); }
    .hash-family-badge { font-family:var(--sans); font-size:0.66rem; padding:3px 10px; border:1px solid rgba(251,146,60,0.3); color:var(--orange); font-weight:600; }
    .hash-category-badge { font-family:var(--sans); font-size:0.66rem; padding:3px 10px; border:1px solid rgba(148,163,184,0.3); color:var(--text); font-weight:500; }
    .hash-source-link { font-family:var(--sans); font-size:0.56rem; font-weight:600; letter-spacing:0.06em; color:var(--muted); border:1px solid var(--border); padding:1px 7px; text-decoration:none; transition:all 0.15s; text-transform:uppercase; }
    .hash-source-link:hover { color:var(--accent); border-color:var(--accent); }
    .hash-source-link-na { font-family:var(--sans); font-size:0.56rem; font-weight:600; letter-spacing:0.06em; color:var(--dim); border:1px solid var(--dim); padding:1px 7px; text-transform:uppercase; opacity:0.6; cursor:default; }
    .tbl-link-chip { font-size:0.6rem; padding:1px 7px; border:1px solid rgba(56,189,248,0.3); color:var(--accent); text-decoration:none; font-family:var(--sans); font-weight:600; letter-spacing:0.04em; transition:all 0.15s; }
    .tbl-link-chip:hover { border-color:var(--accent); background:rgba(56,189,248,0.08); }
    .tbl-link-chip.ab { color:var(--orange); border-color:rgba(251,146,60,0.3); }
    .tbl-link-chip.ab:hover { border-color:var(--orange); background:rgba(251,146,60,0.08); }
    .tbl-link-chip.ip { color:var(--green); border-color:rgba(52,211,153,0.3); }
    .tbl-link-chip.ip:hover { border-color:var(--green); background:rgba(52,211,153,0.08); }
    .tbl-link-na { font-size:0.6rem; padding:1px 7px; border:1px solid rgba(78,100,128,0.3); color:var(--dim); font-family:var(--sans); font-weight:600; letter-spacing:0.04em; opacity:0.7; cursor:default; }
    .hash-tag { font-size:0.6rem; padding:3px 9px; border:1px solid var(--border); color:var(--text); background:rgba(255,255,255,0.03); font-family:var(--sans); }
    .vt-badge { font-size:0.62rem; padding:3px 10px; border:1px solid var(--border); font-family:var(--sans); font-weight:500; }
    .vt-badge.mal { color:var(--red); border-color:rgba(248,113,113,0.3); }
    .vt-badge.sus { color:var(--yellow); border-color:rgba(251,191,36,0.3); }
    .vt-badge.ok  { color:var(--green); border-color:rgba(52,211,153,0.3); }
    .vt-badge.unk { color:var(--muted); border-color:rgba(78,100,128,0.3); }

    /* ── VT sub-section labels ── */
    .vt-subsection-label { font-size:0.62rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-top:10px; margin-bottom:4px; }

    /* ── Sandbox classification badges ── */
    .sandbox-badge { font-size:0.66rem; padding:3px 10px; border:1px solid rgba(192,132,252,0.35); color:#c084fc; font-family:var(--sans); font-weight:600; letter-spacing:0.04em; }

    /* ── Sigma rule pills ── */
    .sigma-block { background:rgba(255,255,255,0.02); border:1px solid var(--border); padding:8px 10px; margin-top:6px; }
    .sigma-ruleset { font-size:0.58rem; color:var(--muted); font-family:var(--mono); margin-bottom:4px; }
    .sigma-pill { font-size:0.66rem; padding:3px 10px; border:1px solid; font-family:var(--sans); font-weight:600; }
    .sigma-pill.critical { color:var(--red);    border-color:rgba(248,113,113,0.35); }
    .sigma-pill.high     { color:var(--orange);  border-color:rgba(251,146,60,0.35);  }
    .sigma-pill.medium   { color:var(--yellow);  border-color:rgba(251,191,36,0.35);  }
    .sigma-pill.low      { color:var(--green);   border-color:rgba(52,211,153,0.35);  }

    /* ── Revocation badges ── */
    .revoked-badge { font-size:0.54rem; font-weight:700; letter-spacing:0.1em; padding:1px 7px; background:rgba(248,113,113,0.12); border:1px solid rgba(248,113,113,0.45); color:var(--red); text-transform:uppercase; }
    .invalid-badge { font-size:0.54rem; font-weight:700; letter-spacing:0.1em; padding:1px 7px; background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.4); color:var(--yellow); text-transform:uppercase; }

    /* ── Structured codesign layout ── */
    .codesign-row { display:flex; gap:8px; margin-top:5px; }
    .codesign-lbl { font-size:0.58rem; font-weight:700; letter-spacing:0.08em; color:rgba(248,113,113,0.6); text-transform:uppercase; min-width:42px; flex-shrink:0; }
    .codesign-val { font-size:0.62rem; color:var(--red); font-family:var(--mono); word-break:break-word; }
    .codesign-status { font-size:0.6rem; color:var(--red); font-family:var(--sans); border-top:1px solid rgba(248,113,113,0.2); padding-top:6px; margin-top:4px; line-height:1.5; }

    /* ── MB found/not-found badges ── */
    .mb-found-badge    { font-size:0.54rem; font-weight:700; padding:1px 7px; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.4); color:var(--red); letter-spacing:0.06em; }
    .mb-notfound-badge { font-size:0.54rem; font-weight:700; padding:1px 7px; background:rgba(78,100,128,0.1); border:1px solid rgba(78,100,128,0.35); color:var(--muted); letter-spacing:0.06em; }
    .filetype-badge { font-size:0.6rem; padding:1px 8px; border:1px solid var(--border); color:var(--text); background:rgba(255,255,255,0.03); font-family:var(--mono); }
    .mb-comment { font-size:0.67rem; color:var(--text); font-family:var(--sans); line-height:1.5; text-align:right; font-style:italic; }
  </style>
</head>
